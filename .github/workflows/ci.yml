name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        # version from package.json "packageManager"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          # Pin CI to Node 22 LTS; package.json engines allows >=22 (e.g. Node 26 locally)
          node-version-file: ".nvmrc"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Validate Bebop timing
        run: pnpm validate:bebop

      - name: Build
        run: pnpm build
